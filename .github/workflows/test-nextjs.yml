name: Vitest (Next.js data layer)

# Runs the Vitest suite over lib/wordpress/* (and any future lib/**/*.test.ts).
# Non-blocking for now (continue-on-error) per #63: land tests, watch them
# stabilize, then flip the gate in a follow-up.
#
# All interpolations are repo-controlled identifiers used as concurrency-
# group keys, not shelled out. No untrusted github.event.* inputs.

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
    paths:
      - 'lib/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vitest.config.ts'
      - '.github/workflows/test-nextjs.yml'
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vitest.config.ts'
      - '.github/workflows/test-nextjs.yml'

concurrency:
  group: test-nextjs-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  vitest:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test
