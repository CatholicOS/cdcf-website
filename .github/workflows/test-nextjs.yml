name: Vitest (Next.js data layer)

# Runs the Vitest suite over lib/wordpress/* (and any future lib/**/*.test.ts).
# Non-blocking for now (continue-on-error) per #63: land tests, watch them
# stabilize, then flip the gate in a follow-up.
#
# All interpolations are repo-controlled identifiers used as concurrency-
# group keys, not shelled out. No untrusted github.event.* inputs.

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
    paths:
      - 'lib/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vitest.config.ts'
      - '.github/workflows/test-nextjs.yml'
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vitest.config.ts'
      - '.github/workflows/test-nextjs.yml'

concurrency:
  group: test-nextjs-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  vitest:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        # Tokenless upload works for public repos via OIDC; CODECOV_TOKEN
        # is used when present (private-repo path / rate-limit relief).
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: nextjs
          # Don't fail the job if Codecov is down — coverage is informational.
          fail_ci_if_error: false
