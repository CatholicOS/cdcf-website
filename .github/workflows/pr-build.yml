name: PR Build Validation

# Run a real `next build` on PRs that touch Next.js build inputs so
# build-only failures (e.g. middleware.ts/proxy.ts file-name conflicts,
# missing imports, type errors not caught by static analyzers) are caught
# pre-merge instead of at production-deploy time.
#
# All interpolations are repo secrets/vars (trusted). No untrusted
# github.event inputs are used.

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
    # No `paths:` filter on purpose. With path filtering, PRs that don't
    # touch build inputs would skip this workflow entirely — and GitHub's
    # required-check rule blocks merge when the check never reports a
    # status. Always-run + caching is the simpler, more reliable shape.
    # Cached cold-build is ~1–2 min, which is acceptable on every PR.

# Cancel earlier runs against the same PR head when a new commit is pushed.
concurrency:
  group: pr-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The cache step runs AFTER `npm ci`, so an unscoped `**/*.ts` glob
      # traverses node_modules and the key changes on every dependency bump —
      # cache miss on every build, hence Next's "No build cache found" warning.
      # Scope the glob to our actual source trees so the key is stable across
      # dep updates (npm install retains the lock-hash component of the key).
      - name: Cache Next.js build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: .next/cache
          key: nextjs-pr-${{ hashFiles('package-lock.json') }}-${{ hashFiles('app/**/*.{ts,tsx,css}', 'lib/**/*.{ts,tsx,css}', 'src/**/*.{ts,tsx,css}', 'components/**/*.{ts,tsx,css}', 'css/**/*.{ts,tsx,css}', 'messages/**/*.json', '*.ts', '*.mjs', 'tsconfig.json') }}
          restore-keys: nextjs-pr-${{ hashFiles('package-lock.json') }}-

      # Build with the same env vars production uses so we exercise the
      # same code path. NEXT_PUBLIC_SITE_URL is set to the production
      # value because we just need a valid URL — the PR-time build
      # doesn't ship anywhere; it just needs to succeed.
      - name: Build Next.js
        env:
          WP_GRAPHQL_URL: ${{ vars.WP_GRAPHQL_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL_PROD }}
        run: npm run build
