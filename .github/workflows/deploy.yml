name: Build and Deploy

# Unified deploy workflow for production and staging.
#
# Triggers:
#   - release: published   → always deploys to production
#   - workflow_dispatch    → user picks environment (default: staging)
#
# All ${{ ... }} interpolations are repo secrets / vars / known choice
# inputs (trusted). No untrusted github.event.* fields are used.
#
# Production-only steps (WP theme + plugin tarballs, plugin activation,
# OPcache flush) are gated behind `if: env.ENVIRONMENT == 'production'`.
# Staging shares
# the same WordPress backend, so we never push theme/plugin from a
# staging deploy — that would overwrite production code.

permissions:
  contents: read

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [production, staging]
        default: staging

# Prevent concurrent deploys to the same environment from racing.
concurrency:
  group: deploy-${{ github.event_name == 'release' && 'production' || inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Release events always map to production; workflow_dispatch uses
      # the user-selected environment.
      ENVIRONMENT: ${{ github.event_name == 'release' && 'production' || inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve environment-specific values (fail-fast)
        # The `${{ X == 'production' && A || B }}` ternary that GitHub
        # Actions supports treats empty strings as falsy — if the prod
        # var was missing, prod deploys would silently fall back to the
        # staging value. Resolve in shell with explicit non-empty checks
        # so misconfiguration surfaces here, before we build or deploy.
        #
        # Also validates the production-only WP_THEME_DIR / WP_PLUGINS_DIR
        # vars (used directly in later production steps): if either were
        # empty, `tar -xzf ... -C ""` would extract to the current
        # directory on the VPS instead of failing, corrupting the deploy.
        env:
          SITE_URL_PROD: ${{ vars.NEXT_PUBLIC_SITE_URL_PROD }}
          SITE_URL_STAGING: ${{ vars.NEXT_PUBLIC_SITE_URL_STAGING }}
          APP_DIR_PROD: ${{ vars.VPS_APP_DIR }}
          APP_DIR_STAGING: ${{ vars.VPS_STAGING_APP_DIR }}
          WP_THEME_DIR: ${{ vars.WP_THEME_DIR }}
          WP_PLUGINS_DIR: ${{ vars.WP_PLUGINS_DIR }}
        run: |
          case "$ENVIRONMENT" in
            production)
              SITE_URL="$SITE_URL_PROD"
              APP_DIR="$APP_DIR_PROD"
              ;;
            staging)
              SITE_URL="$SITE_URL_STAGING"
              APP_DIR="$APP_DIR_STAGING"
              ;;
            *)
              echo "ERROR: ENVIRONMENT=$ENVIRONMENT (expected 'production' or 'staging')"
              exit 1
              ;;
          esac

          if [ -z "$SITE_URL" ]; then
            echo "ERROR: NEXT_PUBLIC_SITE_URL for $ENVIRONMENT is empty (expected vars.NEXT_PUBLIC_SITE_URL_$(echo "$ENVIRONMENT" | tr '[:lower:]' '[:upper:]'))"
            exit 1
          fi
          if [ -z "$APP_DIR" ]; then
            echo "ERROR: APP_DIR for $ENVIRONMENT is empty (expected vars.VPS_APP_DIR or vars.VPS_STAGING_APP_DIR)"
            exit 1
          fi

          # Production-only vars: validate now so later WP-extract steps
          # don't silently extract to "" / the runner's current directory
          # if these were misconfigured.
          if [ "$ENVIRONMENT" = "production" ]; then
            if [ -z "$WP_THEME_DIR" ]; then
              echo "ERROR: vars.WP_THEME_DIR is empty (required for production)"
              exit 1
            fi
            if [ -z "$WP_PLUGINS_DIR" ]; then
              echo "ERROR: vars.WP_PLUGINS_DIR is empty (required for production)"
              exit 1
            fi
          fi

          {
            echo "RESOLVED_SITE_URL=$SITE_URL"
            echo "RESOLVED_APP_DIR=$APP_DIR"
          } >> "$GITHUB_ENV"
          echo "Resolved for $ENVIRONMENT: SITE_URL=$SITE_URL  APP_DIR=$APP_DIR"

      # The cache step runs AFTER `npm ci`, so an unscoped `**/*.ts` glob
      # traverses node_modules and the key changes on every dependency bump —
      # cache miss on every build, hence Next's "No build cache found" warning.
      # Scope the glob to our actual source trees so the key is stable across
      # dep updates (npm install retains the lock-hash component of the key).
      - name: Cache Next.js build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .next/cache
          key: nextjs-${{ env.ENVIRONMENT }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('app/**/*.{ts,tsx,css}', 'lib/**/*.{ts,tsx,css}', 'src/**/*.{ts,tsx,css}', 'components/**/*.{ts,tsx,css}', 'css/**/*.{ts,tsx,css}', 'messages/**/*.json', '*.ts', '*.mjs', 'tsconfig.json') }}
          restore-keys: nextjs-${{ env.ENVIRONMENT }}-${{ hashFiles('package-lock.json') }}-

      - name: Build Next.js
        env:
          WP_GRAPHQL_URL: ${{ vars.WP_GRAPHQL_URL }}
          # Resolved + validated above, so no risk of an empty value silently
          # baking the wrong URL into the client bundle.
          NEXT_PUBLIC_SITE_URL: ${{ env.RESOLVED_SITE_URL }}
        run: npm run build

      - name: Prepare Next.js bundle
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          tar -czf /tmp/nextjs-bundle.tar.gz -C .next/standalone .

      # cdcf-mcp ships the MCP adapter as a runtime Composer dependency, so its
      # vendor/ must be installed (from the committed lock) before bundling.
      # Unlike cdcf-redis-translations, whose Composer deps are dev-only.
      - name: Setup PHP for cdcf-mcp runtime deps
        if: env.ENVIRONMENT == 'production'
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2.37.1
        with:
          php-version: '8.3'
          tools: composer

      - name: Prepare WP theme and plugin bundles
        if: env.ENVIRONMENT == 'production'
        run: |
          tar -czf /tmp/wp-theme.tar.gz -C wordpress/themes/cdcf-headless .
          tar -czf /tmp/wp-plugin-redis-translations.tar.gz -C wordpress/plugins/cdcf-redis-translations .
          # Install cdcf-mcp's runtime deps (the MCP adapter) from the lock and
          # bundle them; the plugin is non-functional without vendor/.
          composer install --no-dev --no-interaction --no-progress \
            --working-dir=wordpress/plugins/cdcf-mcp
          tar -czf /tmp/wp-plugin-cdcf-mcp.tar.gz -C wordpress/plugins/cdcf-mcp .

      - name: Setup SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST_KEY: ${{ vars.VPS_HOST_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Pinned host key from the VPS_HOST_KEY repo variable. Capture
          # once with `ssh-keyscan <host>` and store as a multi-line repo
          # variable; if the server's host key ever rotates, regenerate
          # and update the variable.
          if [ -z "$VPS_HOST_KEY" ]; then
            echo "ERROR: VPS_HOST_KEY repo variable is empty. Refusing to deploy without a pinned host key."
            exit 1
          fi
          echo "$VPS_HOST_KEY" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Sanity-check pinned host key against DNS SSHFP records
        # Non-fatal drift check. The pinned VPS_HOST_KEY is the trust
        # anchor; this step compares it against the SSHFP records
        # published in DNS for catholicdigitalcommons.org and emits
        # GitHub-Actions warnings on any divergence so we notice if:
        #   - the pin is stale (server rotated, DNS was updated, but
        #     VPS_HOST_KEY wasn't)
        #   - or DNS lags reality (we re-pinned but DNS hasn't been
        #     re-published)
        # Either way, deploys keep running on the pinned key.
        env:
          VPS_HOST_KEY: ${{ vars.VPS_HOST_KEY }}
          SSHFP_HOST: catholicdigitalcommons.org
        run: |
          if ! command -v dig >/dev/null; then
            echo "::warning::dig not available; skipping SSHFP drift check."
            exit 0
          fi

          # SHA-256 hex fingerprint of each pinned key's raw blob
          # (uppercase, sorted, deduped). known_hosts lines are
          # `<host> <keytype> <base64-key> [comment]`.
          PIN_FPS=$(printf '%s\n' "$VPS_HOST_KEY" \
            | awk '$2 ~ /^(ssh-|ecdsa-)/' \
            | while read -r _host _alg keyb64 _; do
                printf '%s' "$keyb64" | base64 -d 2>/dev/null | sha256sum | awk '{print toupper($1)}'
              done \
            | sort -u)

          # SHA-256 SSHFP records (hashtype 2). dig may split long
          # hashes with a space; strip it before comparison.
          DNS_FPS=$(dig +short SSHFP "$SSHFP_HOST" \
            | awk '$2 == "2" {for (i=3; i<=NF; i++) printf "%s", $i; print ""}' \
            | tr -d ' ' \
            | tr 'a-f' 'A-F' \
            | sort -u)

          if [ -z "$DNS_FPS" ]; then
            echo "::warning::No SHA-256 SSHFP records found for $SSHFP_HOST; skipping drift check."
            exit 0
          fi
          if [ -z "$PIN_FPS" ]; then
            echo "::warning::Could not derive any fingerprints from VPS_HOST_KEY; skipping drift check."
            exit 0
          fi

          PIN_NOT_IN_DNS=$(comm -23 <(echo "$PIN_FPS") <(echo "$DNS_FPS"))
          DNS_NOT_IN_PIN=$(comm -13 <(echo "$PIN_FPS") <(echo "$DNS_FPS"))

          if [ -n "$PIN_NOT_IN_DNS" ]; then
            while IFS= read -r fp; do
              echo "::warning::Pinned key SHA256:$fp not in DNS SSHFP for $SSHFP_HOST. Either DNS lags reality or VPS_HOST_KEY is stale."
            done <<< "$PIN_NOT_IN_DNS"
          fi
          if [ -n "$DNS_NOT_IN_PIN" ]; then
            while IFS= read -r fp; do
              echo "::warning::DNS SSHFP advertises SHA256:$fp which is NOT in pinned VPS_HOST_KEY. Server may have rotated; consider regenerating the pin."
            done <<< "$DNS_NOT_IN_PIN"
          fi

          if [ -z "$PIN_NOT_IN_DNS" ] && [ -z "$DNS_NOT_IN_PIN" ]; then
            echo "Pin matches DNS SSHFP records for $SSHFP_HOST."
          fi

      - name: Upload Next.js bundle
        env:
          VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          for attempt in 1 2 3; do
            echo "Upload attempt $attempt..."
            if scp -i ~/.ssh/deploy_key \
              -o ConnectTimeout=10 -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
              /tmp/nextjs-bundle.tar.gz \
              "${VPS_USERNAME}@${VPS_HOST}:/tmp/nextjs-bundle.tar.gz"; then
              echo "Upload succeeded on attempt $attempt"
              exit 0
            fi
            echo "Upload failed on attempt $attempt"
            [ "$attempt" -lt 3 ] && echo "Waiting 15 seconds before retry..." && sleep 15
          done
          echo "All upload attempts failed"
          exit 1

      - name: Upload WP theme/plugin bundles
        if: env.ENVIRONMENT == 'production'
        env:
          VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          for attempt in 1 2 3; do
            echo "Upload attempt $attempt..."
            if scp -i ~/.ssh/deploy_key \
              -o ConnectTimeout=10 -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
              /tmp/wp-theme.tar.gz /tmp/wp-plugin-redis-translations.tar.gz /tmp/wp-plugin-cdcf-mcp.tar.gz \
              "${VPS_USERNAME}@${VPS_HOST}:/tmp/"; then
              echo "Upload succeeded on attempt $attempt"
              exit 0
            fi
            echo "Upload failed on attempt $attempt"
            [ "$attempt" -lt 3 ] && echo "Waiting 15 seconds before retry..." && sleep 15
          done
          echo "All upload attempts failed"
          exit 1

      - name: Extract Next.js bundle and restart
        env:
          VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          # Resolved + validated in the "Resolve environment-specific values" step.
          APP_DIR: ${{ env.RESOLVED_APP_DIR }}
        run: |
          for attempt in 1 2 3; do
            echo "SSH attempt $attempt..."
            if ssh -i ~/.ssh/deploy_key \
              -o ConnectTimeout=10 -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
              "${VPS_USERNAME}@${VPS_HOST}" \
              "mkdir -p \"$APP_DIR\" && \
               tar -xzf /tmp/nextjs-bundle.tar.gz -C \"$APP_DIR\" && \
               mkdir -p \"$APP_DIR/tmp\" && \
               touch \"$APP_DIR/tmp/restart.txt\" && \
               rm /tmp/nextjs-bundle.tar.gz"; then
              echo "SSH succeeded on attempt $attempt"
              exit 0
            fi
            echo "SSH failed on attempt $attempt"
            [ "$attempt" -lt 3 ] && echo "Waiting 15 seconds before retry..." && sleep 15
          done
          echo "All SSH attempts failed"
          exit 1

      - name: Pause queue worker for deploy
        if: env.ENVIRONMENT == 'production'
        # When staging gets its own WP backend, also gate this step on
        # env.ENVIRONMENT == 'staging' and route to the staging WP REST URL.
        # Today staging shares the production backend, so only production
        # deploys touch FPM hard enough to need the pause.
        env:
          WP_REST_URL: ${{ vars.WP_REST_URL }}
          WP_APP_USERNAME: ${{ secrets.WP_APP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: |
          AUTH=$(echo -n "$WP_APP_USERNAME:$WP_APP_PASSWORD" | base64)

          # Warm the WP REST stack before the timed call. The cms PHP-FPM pool
          # is `ondemand` with a short idle timeout, so after a quiet period
          # there may be no live worker — and the "Extract Next.js bundle and
          # restart" step just before this one floods the shared backend,
          # spawning cold workers that each bootstrap WordPress (ACF, Polylang,
          # WPGraphQL, ...) at once. A throwaway GET pays that cold-start cost
          # so the maintenance POST below sees a warm worker. Best-effort:
          # `|| true` so a slow/failed warm-up never trips `set -e`.
          curl -sS -o /dev/null --connect-timeout 10 --max-time 60 \
            "$WP_REST_URL/" || true

          for attempt in 1 2 3; do
            # `|| true` so a curl transport failure (e.g. timeout, exit 28)
            # doesn't trip `set -e` and abort the step before the retry loop
            # and 404/best-effort fallbacks below ever run. On failure curl
            # still writes the http_code ("000") to stdout via -w.
            STATUS=$(curl -sS -o /tmp/maint-begin.json -w '%{http_code}' \
              --connect-timeout 10 --max-time 60 \
              -X POST "$WP_REST_URL/cdcf/v1/maintenance" \
              -H "Authorization: Basic $AUTH" \
              -H "Content-Type: application/json" \
              -d '{"action":"begin","duration_seconds":300}') || true
            if [ "$STATUS" = "200" ]; then
              echo "Worker paused: $(cat /tmp/maint-begin.json)"
              exit 0
            fi
            # HTTP 404 means the maintenance endpoint isn't deployed yet —
            # which is exactly the case during the bootstrap deploy that
            # first introduces it (or any time the plugin is uninstalled).
            # Retrying won't change that, so proceed without the pause.
            if [ "$STATUS" = "404" ]; then
              echo "::warning::Maintenance endpoint returned 404; proceeding without pause. Expected on the bootstrap deploy that introduces the endpoint."
              exit 0
            fi
            echo "Maintenance begin attempt $attempt failed (HTTP $STATUS)"
            [ "$attempt" -lt 3 ] && sleep 5
          done
          # Pausing the worker is a best-effort optimization to reduce FPM
          # stress during the WP extract; it is not required for correctness
          # (the begin TTL self-heals, and a missed pause just means baseline
          # FPM load). A transient backend hiccup must not abort the whole
          # production deploy, so warn and proceed instead of exiting non-zero.
          echo "::warning::Failed to pause queue worker after 3 attempts; proceeding without pause (baseline FPM load)."

      - name: Extract WP theme and plugin bundles
        if: env.ENVIRONMENT == 'production'
        env:
          VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          WP_THEME_DIR: ${{ vars.WP_THEME_DIR }}
          WP_PLUGINS_DIR: ${{ vars.WP_PLUGINS_DIR }}
        run: |
          for attempt in 1 2 3; do
            echo "SSH attempt $attempt..."
            if ssh -i ~/.ssh/deploy_key \
              -o ConnectTimeout=10 -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
              "${VPS_USERNAME}@${VPS_HOST}" \
              "mkdir -p \"$WP_THEME_DIR\" && \
               tar -xzf /tmp/wp-theme.tar.gz -C \"$WP_THEME_DIR\" && \
               mkdir -p \"$WP_PLUGINS_DIR/cdcf-redis-translations\" && \
               tar -xzf /tmp/wp-plugin-redis-translations.tar.gz -C \"$WP_PLUGINS_DIR/cdcf-redis-translations\" && \
               mkdir -p \"$WP_PLUGINS_DIR/cdcf-mcp\" && \
               tar -xzf /tmp/wp-plugin-cdcf-mcp.tar.gz -C \"$WP_PLUGINS_DIR/cdcf-mcp\" && \
               rm /tmp/wp-theme.tar.gz /tmp/wp-plugin-redis-translations.tar.gz /tmp/wp-plugin-cdcf-mcp.tar.gz"; then
              echo "SSH succeeded on attempt $attempt"
              exit 0
            fi
            echo "SSH failed on attempt $attempt"
            [ "$attempt" -lt 3 ] && echo "Waiting 15 seconds before retry..." && sleep 15
          done
          echo "All SSH attempts failed"
          exit 1

      - name: Activate plugins
        if: env.ENVIRONMENT == 'production'
        env:
          WP_REST_URL: ${{ vars.WP_REST_URL }}
          WP_APP_USERNAME: ${{ secrets.WP_APP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: |
          # Activate plugins idempotently. GET current status first and only
          # POST when it isn't already "active". Each POST triggers
          # flush_rewrite_rules() in WP, which rewrites .htaccess and
          # briefly desyncs Plesk's nginx mirror — that race is the
          # suspected cause of the /wp-json/* 404 wave during deploys
          # (issue #41).
          WP_URL="$WP_REST_URL/wp/v2/plugins"
          AUTH=$(echo -n "$WP_APP_USERNAME:$WP_APP_PASSWORD" | base64)
          FAILED=0
          for PLUGIN in redis-queue/redis-queue cdcf-redis-translations/cdcf-redis-translations cdcf-mcp/cdcf-mcp; do
            # The WP REST plugins route expects a literal "/" in the slug;
            # encoding it as %2F yields rest_plugin_not_found (404).
            CURRENT=$(curl -sS -w '\n%{http_code}' \
              --connect-timeout 10 --max-time 30 \
              -X GET "$WP_URL/$PLUGIN" \
              -H "Authorization: Basic $AUTH")
            GET_STATUS=$(echo "$CURRENT" | tail -n1)
            BODY=$(echo "$CURRENT" | sed '$d')

            if [ "$GET_STATUS" -lt 200 ] || [ "$GET_STATUS" -ge 300 ]; then
              echo "::error::Failed to read $PLUGIN status (HTTP $GET_STATUS)"
              FAILED=1
              continue
            fi

            # Extract the "status" field. Falls back to "unknown" on parse
            # failure, which forces the activate path (safe default).
            CURRENT_STATUS=$(echo "$BODY" | python3 -c 'import json, sys; print(json.load(sys.stdin).get("status", "unknown"))' 2>/dev/null || echo unknown)

            if [ "$CURRENT_STATUS" = "active" ]; then
              echo "Skip $PLUGIN: already active"
              continue
            fi

            STATUS=$(curl -sS -o /dev/null -w '%{http_code}' \
              --connect-timeout 10 --max-time 30 \
              -X POST "$WP_URL/$PLUGIN" \
              -H "Authorization: Basic $AUTH" \
              -H "Content-Type: application/json" \
              -d '{"status":"active"}')
            echo "Activate $PLUGIN (was $CURRENT_STATUS): HTTP $STATUS"
            # Treat anything outside 2xx as a failure but keep going so the
            # log shows the status of every plugin, not just the first failure.
            if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
              echo "::error::Failed to activate $PLUGIN (HTTP $STATUS)"
              FAILED=1
            fi
          done
          if [ "$FAILED" -ne 0 ]; then
            echo "One or more plugin activations failed; failing the deploy."
            exit 1
          fi

      - name: Flush OPcache after code deploy
        if: env.ENVIRONMENT == 'production'
        env:
          WP_REST_URL: ${{ vars.WP_REST_URL }}
          WP_APP_USERNAME: ${{ secrets.WP_APP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: |
          # The theme/plugin tarballs were just extracted over the live files,
          # but PHP-FPM's OPcache keeps serving the previous bytecode until it
          # is reset (indefinitely under validate_timestamps=0). "Activate
          # plugins" above skips reactivation when a plugin is already active,
          # so it does NOT pick up new code on its own. Reset OPcache here —
          # before the worker resumes and before the smoke test — so every
          # path runs the freshly-deployed code. (/cdcf/v1/flush-opcache does
          # opcache_reset() + opcache_invalidate(functions.php) + flush
          # rewrite rules; it takes no body.)
          AUTH=$(echo -n "$WP_APP_USERNAME:$WP_APP_PASSWORD" | base64)
          for attempt in 1 2 3; do
            STATUS=$(curl -sS -o /dev/null -w '%{http_code}' \
              --connect-timeout 10 --max-time 30 \
              -X POST "$WP_REST_URL/cdcf/v1/flush-opcache" \
              -H "Authorization: Basic $AUTH")
            if [ "$STATUS" = "200" ]; then
              echo "OPcache flushed."
              exit 0
            fi
            echo "Flush attempt $attempt failed (HTTP $STATUS)"
            [ "$attempt" -lt 3 ] && sleep 5
          done
          # Hard-fail: a green deploy that silently left stale bytecode is the
          # exact failure this step exists to prevent. The fix is a re-run or a
          # manual flush; files are already in place. The next step
          # (Resume queue worker) runs regardless via its always() guard.
          echo "::error::Failed to flush OPcache after 3 attempts (HTTP $STATUS); deployed code may not be live."
          exit 1

      - name: Warm OPcache after reset
        if: env.ENVIRONMENT == 'production'
        env:
          WP_REST_URL: ${{ vars.WP_REST_URL }}
        run: |
          # The flush above does a full opcache_reset(), so the next WP request
          # recompiles WordPress + the theme/plugin from scratch. On a cold
          # cache that first request can exceed 30s — which is what timed out
          # the "Resume queue worker" step and made a successful deploy go red.
          # Prime the cache here with generous-timeout GETs to the REST index
          # (which boots core + fires rest_api_init → loads functions.php and
          # the cdcf handlers) so the steps below hit a warm cache.
          #
          # Best-effort: a failed warm-up only means the next step pays the
          # recompile cost, so log and continue rather than fail the deploy.
          for attempt in 1 2 3; do
            CODE=$(curl -sS -o /dev/null -w '%{http_code}' \
              --connect-timeout 10 --max-time 90 "$WP_REST_URL" || echo "000")
            echo "Warm-up attempt $attempt: HTTP $CODE"
            [ "$CODE" != "000" ] && [ "$CODE" -ge 200 ] && [ "$CODE" -lt 500 ] && exit 0
            sleep 3
          done
          echo "::warning::OPcache warm-up did not get a healthy response; the next step may pay the cold-cache recompile cost."

      - name: Resume queue worker after deploy
        if: always() && env.ENVIRONMENT == 'production'
        env:
          WP_REST_URL: ${{ vars.WP_REST_URL }}
          WP_APP_USERNAME: ${{ secrets.WP_APP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: |
          AUTH=$(echo -n "$WP_APP_USERNAME:$WP_APP_PASSWORD" | base64)
          for attempt in 1 2 3; do
            # `|| true` so a curl transport failure (e.g. timeout, exit 28)
            # doesn't trip `set -e` and skip the retry loop and the self-heal
            # warning below. On failure curl still writes "000" via -w.
            STATUS=$(curl -sS -o /dev/null -w '%{http_code}' \
              --connect-timeout 10 --max-time 60 \
              -X POST "$WP_REST_URL/cdcf/v1/maintenance" \
              -H "Authorization: Basic $AUTH" \
              -H "Content-Type: application/json" \
              -d '{"action":"end"}') || true
            if [ "$STATUS" = "200" ]; then
              echo "Worker resumed."
              exit 0
            fi
            echo "Maintenance end attempt $attempt failed (HTTP $STATUS)"
            [ "$attempt" -lt 3 ] && sleep 5
          done
          # Don't exit 1 here — the TTL self-heals within 600s and failing
          # this step would mask the real outcome of the deploy.
          echo "::warning::Failed to resume queue worker; will self-heal via TTL within 600s."

      - name: Smoke-test the deployed site (English + Italian)
        # Minimal canary: confirm the just-deployed Next.js process is
        # reachable on the public URL and that locale routing produces
        # sane responses for both the default locale (rewrite path) and
        # at least one non-default locale (redirect path). Catches the
        # specific failure mode the next-intl 4.11.0 upgrade produced
        # (locale redirects with the upstream Node.js port leaking into
        # the Location header), plus any future outage where the public
        # URL stops responding entirely.
        env:
          SITE_URL: ${{ env.RESOLVED_SITE_URL }}
        run: |
          set -e

          if [ -z "$SITE_URL" ]; then
            echo "::error::SITE_URL is empty — Resolve step should have set RESOLVED_SITE_URL."
            exit 1
          fi
          echo "Smoke testing $SITE_URL"

          # Extract the expected public-facing host (without port) so we
          # can validate any Location header points back at us cleanly.
          EXPECTED_HOST=$(echo "$SITE_URL" | awk -F/ '{print $3}' | awk -F: '{print $1}')

          # English check: expect 200 OK. Internal middleware rewrites
          # / to /en, so there is no Location header on the response.
          for attempt in 1 2 3; do
            EN_STATUS=$(curl -sS -o /dev/null -w '%{http_code}' \
              --connect-timeout 10 --max-time 30 \
              -H 'Accept-Language: en-US,en;q=0.9' \
              "$SITE_URL/")
            if [ "$EN_STATUS" = "200" ]; then
              echo "EN smoke: HTTP 200 OK"
              break
            fi
            echo "EN smoke attempt $attempt: HTTP $EN_STATUS"
            if [ "$attempt" -eq 3 ]; then
              echo "::error::English smoke test failed — GET / returned $EN_STATUS (expected 200)"
              exit 1
            fi
            sleep 5
          done

          # Italian check: expect 200 OR 307. If 307, validate the
          # Location header has the expected hostname AND no explicit
          # port (catches the upstream-port-leak class of bugs).
          for attempt in 1 2 3; do
            IT_HEADERS=$(curl -sS -I --connect-timeout 10 --max-time 30 \
              -H 'Accept-Language: it-IT,it;q=0.9,en;q=0.8' \
              "$SITE_URL/")
            IT_STATUS=$(echo "$IT_HEADERS" | head -n1 | awk '{print $2}')
            # `|| true` because grep returns 1 when the response has no
            # Location header (the happy 200 case), which would otherwise
            # abort the step under the GitHub-Actions-default bash flags
            # `-e -o pipefail`. Want IT_LOCATION="" instead.
            IT_LOCATION=$(echo "$IT_HEADERS" | grep -i '^location:' | sed 's/^[Ll]ocation: //' | tr -d '\r' || true)

            if [ "$IT_STATUS" = "200" ] || [ "$IT_STATUS" = "307" ]; then
              if [ -n "$IT_LOCATION" ]; then
                IT_LOC_HOST_PORT=$(echo "$IT_LOCATION" | awk -F/ '{print $3}')
                IT_LOC_HOST=$(echo "$IT_LOC_HOST_PORT" | awk -F: '{print $1}')
                IT_LOC_PORT=$(echo "$IT_LOC_HOST_PORT" | awk -F: '{print $2}')
                if [ "$IT_LOC_HOST" != "$EXPECTED_HOST" ]; then
                  echo "::error::IT smoke test failed — Location host '$IT_LOC_HOST' does not match expected '$EXPECTED_HOST' (full Location: $IT_LOCATION)"
                  exit 1
                fi
                if [ -n "$IT_LOC_PORT" ]; then
                  echo "::error::IT smoke test failed — Location carries an explicit port ':$IT_LOC_PORT' (the upstream-port-leak failure mode); full Location: $IT_LOCATION"
                  exit 1
                fi
              fi
              echo "IT smoke: HTTP $IT_STATUS -> ${IT_LOCATION:-<internal rewrite>}"
              break
            fi
            echo "IT smoke attempt $attempt: HTTP $IT_STATUS"
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Italian smoke test failed — GET / returned $IT_STATUS (expected 200 or 307)"
              exit 1
            fi
            sleep 5
          done
