name: Build and Deploy

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.css') }}
          restore-keys: nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Build Next.js
        run: npm run build
        env:
          WORDPRESS_GRAPHQL_URL: ${{ secrets.WORDPRESS_GRAPHQL_URL }}

      - name: Prepare bundles
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          tar -czf /tmp/nextjs-bundle.tar.gz -C .next/standalone .
          tar -czf /tmp/wp-theme.tar.gz -C wordpress/themes/cdcf-headless .
          tar -czf /tmp/wp-plugin-redis-translations.tar.gz -C wordpress/plugins/cdcf-redis-translations .

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Upload bundles
        run: |
          scp -i ~/.ssh/deploy_key \
            /tmp/nextjs-bundle.tar.gz /tmp/wp-theme.tar.gz /tmp/wp-plugin-redis-translations.tar.gz \
            ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:/tmp/

      - name: Extract and restart
        run: |
          sleep 5
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} \
            "mkdir -p ${{ secrets.VPS_APP_DIR }} && \
             tar -xzf /tmp/nextjs-bundle.tar.gz -C ${{ secrets.VPS_APP_DIR }} && \
             rm /tmp/nextjs-bundle.tar.gz && \
             mkdir -p ${{ secrets.WP_THEME_DIR }} && \
             tar -xzf /tmp/wp-theme.tar.gz -C ${{ secrets.WP_THEME_DIR }} && \
             rm /tmp/wp-theme.tar.gz && \
             mkdir -p ${{ secrets.WP_PLUGINS_DIR }}/cdcf-redis-translations && \
             tar -xzf /tmp/wp-plugin-redis-translations.tar.gz -C ${{ secrets.WP_PLUGINS_DIR }}/cdcf-redis-translations && \
             rm /tmp/wp-plugin-redis-translations.tar.gz && \
             mkdir -p ${{ secrets.VPS_APP_DIR }}/tmp && \
             touch ${{ secrets.VPS_APP_DIR }}/tmp/restart.txt"

      - name: Activate plugins
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} \
            "cd ${{ secrets.WP_ROOT_DIR }} && \
             wp plugin activate redis-queue cdcf-redis-translations 2>/dev/null || true"
