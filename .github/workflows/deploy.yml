name: Build and Deploy

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          WORDPRESS_GRAPHQL_URL: ${{ secrets.WORDPRESS_GRAPHQL_URL }}

      - name: Prepare standalone bundle
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy Next.js to VPS
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            .next/standalone/ \
            ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_APP_DIR }}/

      - name: Deploy WordPress theme
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            wordpress/themes/cdcf-headless/ \
            ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:${{ secrets.WP_THEME_DIR }}/

      - name: Restart Next.js
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} \
            "cd ${{ secrets.VPS_APP_DIR }} && \
             pm2 restart cdcf-cms || \
             WORDPRESS_GRAPHQL_URL=${{ secrets.WORDPRESS_GRAPHQL_URL }} \
             WORDPRESS_PREVIEW_SECRET=${{ secrets.WORDPRESS_PREVIEW_SECRET }} \
             pm2 start server.js --name cdcf-cms"
