name: Build and Deploy

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          WORDPRESS_GRAPHQL_URL: ${{ secrets.WORDPRESS_GRAPHQL_URL }}

      - name: Prepare standalone bundle
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy Next.js to VPS
        run: |
          tar -czf /tmp/nextjs-bundle.tar.gz -C .next/standalone .
          scp -i ~/.ssh/deploy_key \
            /tmp/nextjs-bundle.tar.gz \
            ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:/tmp/nextjs-bundle.tar.gz
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} \
            "mkdir -p ${{ secrets.VPS_APP_DIR }} && \
             tar -xzf /tmp/nextjs-bundle.tar.gz -C ${{ secrets.VPS_APP_DIR }} && \
             rm /tmp/nextjs-bundle.tar.gz"

      - name: Deploy WordPress theme
        run: |
          tar -czf /tmp/wp-theme.tar.gz -C wordpress/themes/cdcf-headless .
          scp -i ~/.ssh/deploy_key \
            /tmp/wp-theme.tar.gz \
            ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:/tmp/wp-theme.tar.gz
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} \
            "mkdir -p ${{ secrets.WP_THEME_DIR }} && \
             tar -xzf /tmp/wp-theme.tar.gz -C ${{ secrets.WP_THEME_DIR }} && \
             rm /tmp/wp-theme.tar.gz"

      - name: Restart Next.js
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} \
            "cd ${{ secrets.VPS_APP_DIR }} && \
             pm2 restart cdcf-cms || \
             WORDPRESS_GRAPHQL_URL=${{ secrets.WORDPRESS_GRAPHQL_URL }} \
             WORDPRESS_PREVIEW_SECRET=${{ secrets.WORDPRESS_PREVIEW_SECRET }} \
             pm2 start server.js --name cdcf-cms"
