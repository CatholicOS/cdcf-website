name: Lint markdown

# Runs prettier --check and markdownlint-cli2 over the repo's markdown
# files. Blocking — the local toolchain (npm run format:md:fix,
# npm run lint:md:fix) makes any failure trivially fixable, and the
# rules are config-controlled (.markdownlint.yml) so the bar is
# owned by this repo.
#
# All interpolations are repo-controlled identifiers used as
# concurrency-group keys, not shelled out. No untrusted github.event.*
# inputs.

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.md'
      - '.markdownlint.yml'
      - '.markdownlint.yaml'
      - '.markdownlint.json'
      - '.prettierrc'
      - '.prettierrc.json'
      - '.prettierrc.yaml'
      - '.prettierignore'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/lint-markdown.yml'
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '.markdownlint.yml'
      - '.markdownlint.yaml'
      - '.markdownlint.json'
      - '.prettierrc'
      - '.prettierrc.json'
      - '.prettierrc.yaml'
      - '.prettierignore'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/lint-markdown.yml'

concurrency:
  group: lint-markdown-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check prettier formatting
        run: npm run format:md:check

      - name: Run markdownlint
        run: npm run lint:md
