name: PHPUnit (WordPress plugin + theme)

# Runs the PHPUnit + Brain Monkey suites over the WordPress plugin
# and theme trees (cdcf-redis-translations, cdcf-mcp, cdcf-headless).
# Non-blocking for now (continue-on-error) per #63:
# land tests, watch them stabilise, then flip the gate in a follow-up.
#
# All interpolations are repo-controlled identifiers used as concurrency-
# group keys or as `working-directory`, never shelled out. No untrusted
# github.event.* inputs.

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
    paths:
      - 'wordpress/plugins/cdcf-redis-translations/**'
      - 'wordpress/plugins/cdcf-mcp/**'
      - 'wordpress/themes/cdcf-headless/**'
      - '.github/workflows/test-wordpress.yml'
  push:
    branches: [main]
    paths:
      - 'wordpress/plugins/cdcf-redis-translations/**'
      - 'wordpress/plugins/cdcf-mcp/**'
      - 'wordpress/themes/cdcf-headless/**'
      - '.github/workflows/test-wordpress.yml'

concurrency:
  group: test-wordpress-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  phpunit:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        tree:
          - plugins/cdcf-redis-translations
          - plugins/cdcf-mcp
          - themes/cdcf-headless

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: '8.3'
          # `:redis` removes the redis extension from the test runtime.
          # The MaintenanceHandlerTest cases use Mockery::mock('overload:Redis')
          # which requires the target class to be undefined at the moment
          # the mock is created. shivammathur/setup-php installs php-redis
          # by default on Ubuntu, so the C-extension Redis class is already
          # loaded and the overload throws "class already exists".
          extensions: ':redis'
          tools: composer
          # PCOV is faster than Xdebug for coverage and ignores the
          # `:redis` removal — it's a separate extension.
          coverage: pcov

      - name: Install dependencies
        working-directory: wordpress/${{ matrix.tree }}
        run: composer install --no-interaction --no-progress

      - name: Run PHPUnit with coverage
        working-directory: wordpress/${{ matrix.tree }}
        run: vendor/bin/phpunit --coverage-clover=coverage.xml

      - name: Derive Codecov flag from matrix tree
        # `plugins/cdcf-redis-translations` -> `wordpress-plugin`
        # `plugins/cdcf-mcp`                -> `wordpress-mcp`
        # `themes/cdcf-headless`            -> `wordpress-theme`
        # Match each plugin explicitly (not `plugins/*`) so the two plugin
        # trees upload under distinct Codecov flags instead of colliding.
        id: flag
        env:
          MATRIX_TREE: ${{ matrix.tree }}
        run: |
          case "$MATRIX_TREE" in
            plugins/cdcf-redis-translations) echo "name=wordpress-plugin" >> "$GITHUB_OUTPUT" ;;
            plugins/cdcf-mcp)                echo "name=wordpress-mcp"    >> "$GITHUB_OUTPUT" ;;
            themes/*)                        echo "name=wordpress-theme"  >> "$GITHUB_OUTPUT" ;;
            *) echo "Unknown matrix tree: $MATRIX_TREE" >&2; exit 1 ;;
          esac

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: wordpress/${{ matrix.tree }}/coverage.xml
          flags: ${{ steps.flag.outputs.name }}
          fail_ci_if_error: false
