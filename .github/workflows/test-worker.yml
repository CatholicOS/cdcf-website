name: bats (queue worker)

# Runs the bats-core suite over scripts/cdcf_queue_worker.lib.sh helpers,
# instruments them with kcov, and uploads cobertura coverage to Codecov
# under the `worker` flag (refs #91 Phase 2). Non-blocking for now
# (continue-on-error) per #63: land tests, watch them stabilize, then
# flip the gate in a follow-up.
#
# All interpolations are repo-controlled identifiers used as concurrency-
# group keys, not shelled out. No untrusted github.event.* inputs.

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/cdcf_queue_worker*'
      - 'scripts/tests/**'
      - '.github/workflows/test-worker.yml'
  push:
    branches: [main]
    paths:
      - 'scripts/cdcf_queue_worker*'
      - 'scripts/tests/**'
      - '.github/workflows/test-worker.yml'

concurrency:
  group: test-worker-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  bats:
    # Pinned to 22.04 because kcov was dropped from Ubuntu noble (24.04)
    # universe. When 22.04 retires, either switch back to ubuntu-latest
    # and build kcov from source (~1-2 min overhead) or pick up a future
    # runner image that ships kcov preinstalled.
    runs-on: ubuntu-22.04
    continue-on-error: true

    steps:
      - name: Checkout code (with bats-core submodule)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: recursive

      - name: Verify python3 is available
        # parse_processed / parse_domain_count tests use the real python3
        # interpreter — they exercise the actual JSON parser, not a shim.
        run: |
          which python3
          python3 --version

      - name: Install kcov
        # kcov instruments bash scripts and emits cobertura.xml for Codecov.
        # Available in the Ubuntu apt archive; no PPA needed.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends kcov

      - name: Run bats under kcov
        # kcov struggles with bats' run-in-subshell test helper unless each
        # .bats file is invoked separately, so we loop and merge. The
        # include pattern restricts measurement to the worker scripts —
        # bats internals, shims, and python helpers are excluded.
        run: |
          mkdir -p coverage
          fail=0
          for f in scripts/tests/*.bats; do
            name=$(basename "$f" .bats)
            kcov \
              --include-pattern=cdcf_queue_worker \
              --bash-dont-parse-binary-dir \
              "coverage/${name}" \
              scripts/tests/bats/bin/bats "$f" || fail=$?
          done
          kcov --merge coverage/merged coverage/*/
          exit "${fail}"

      - name: Upload coverage to Codecov (worker flag)
        # if: always() so coverage uploads even when a bats test fails.
        # `fail_ci_if_error: false` matches the policy used by the other
        # test workflows — Codecov outages don't fail the build.
        # `disable_search: true` stops the action from auto-discovering
        # additional coverage files in the workspace — without it, the
        # per-bats-file kcov outputs and bats-core's own report.xml from
        # the submodule get uploaded alongside the merged cobertura.xml
        # and pollute the worker flag's numbers.
        if: always()
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/merged/kcov-merged/cobertura.xml
          flags: worker
          fail_ci_if_error: false
          disable_search: true
