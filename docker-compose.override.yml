# Dev overrides: expose WordPress on localhost:8000
# This file is auto-loaded by `docker compose up` alongside docker-compose.yml.
# It is NOT used in production (CI/CD should use `docker compose -f docker-compose.yml`).
services:
  wordpress:
    ports:
      - "8000:80"
    environment:
      # Dev-only: WordPress gates Application Passwords on
      # is_ssl() || wp_get_environment_type() === 'local'. Over plain
      # http://localhost they'd be disabled, breaking authenticated
      # REST/GraphQL and headless draft preview. 'local' enables them.
      WP_ENVIRONMENT_TYPE: local
      # Expose the preview/revalidate secret to the theme, which falls back to
      # getenv('WP_PREVIEW_SECRET') when CDCF_PREVIEW_SECRET isn't defined
      # (it's only define()'d in wp-config on production).
      WP_PREVIEW_SECRET: ${WP_PREVIEW_SECRET}
    # Pilot: mount the cdcf-mcp prototype plugin. It is deliberately kept out
    # of the base docker-compose.yml (docs/wordpress-mcp-evaluation.md §5), so
    # this dev-only override is the opt-in. Its vendor/ (the MCP adapter) is a
    # RUNTIME dep and must be installed on the host first:
    #   composer install --working-dir=wordpress/plugins/cdcf-mcp
    # Activate with: docker compose run --rm wpcli wp plugin activate cdcf-mcp
    volumes:
      - ./wordpress/plugins/cdcf-mcp:/var/www/html/wp-content/plugins/cdcf-mcp

  # The CLI services need the same mount to manage/activate the plugin.
  wp-init:
    volumes:
      - ./wordpress/plugins/cdcf-mcp:/var/www/html/wp-content/plugins/cdcf-mcp
  wpcli:
    volumes:
      - ./wordpress/plugins/cdcf-mcp:/var/www/html/wp-content/plugins/cdcf-mcp
